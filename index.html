<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brian Corley</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      color: #f8fafc;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 2rem;
    }

    .container {
      max-width: 600px;
      text-align: center;
    }

    .construction {
      font-size: 1rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #fbbf24;
      margin-bottom: 2rem;
    }

    h1 {
      margin: 0 0 1.5rem;
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 700;
    }

    p {
      color: #cbd5e1;
      font-size: 1.1rem;
      line-height: 1.7;
      margin: 1rem 0;
    }

    a {
      color: #38bdf8;
      text-decoration: none;
      font-weight: 600;
    }

    a:hover {
      text-decoration: underline;
    }

    .footer {
      margin-top: 3rem;
      color: #64748b;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="construction">
      🚧 Under Construction 🚧
    </div>

    <h1>Thanks for stopping by.</h1>

    <p>
      I'm currently building out this site and portfolio.
    </p>

    <p>
      Until then, you can find me on
      <a href="https://github.com/corleyb2" target="_blank">GitHub</a>.
    </p>

    <div class="footer">
      Check back soon.
    </div>
  </main>
</body>
</html>
